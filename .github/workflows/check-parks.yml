name: Check Park Alerts

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: park-check
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore cached binary
        id: binary-cache
        uses: actions/cache@v4
        with:
          path: .build/release/EstadoParques
          key: binary-${{ hashFiles('Sources/**', 'Package.swift', 'Package.resolved') }}

      - name: Restore SPM build cache
        if: steps.binary-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Build
        if: steps.binary-cache.outputs.cache-hit != 'true'
        run: swift build -c release

      - name: Run park check
        env:
          MASTODON_INSTANCE: ${{ secrets.MASTODON_INSTANCE }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          PRODUCTION: ${{ vars.PRODUCTION }}
        run: .build/release/EstadoParques

      - name: Commit state changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add estado_parques.json
          git add estadisticas_parques.ndjson 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Update park state $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
